<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fila de Closers Mercadinho do Seo Juca</title>

<style>
:root {
  --accent: #033517;
  --bg: #f5f4f0;
  --text: #111;
}

body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 380px;
  text-align: center;
}

h1 {
  font-size: 18px;
  margin-bottom: 20px;
}

.closer {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border: 1px solid #ddd;
  border-radius: 6px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  cursor: pointer;
  border-radius: 6px;
  margin-top: 5px;
}

.primary {
  background: var(--accent);
  color: white;
}

.secondary {
  background: #eee;
}
</style>
</head>

<body>

<div class="card">

  <h1>Fila de Closers<br>Mercadinho do Seo Juca</h1>

  <div class="closer" id="closer">Carregando...</div>

  <input id="sdr" placeholder="Nome do SDR">
  <input id="lead" placeholder="Nome do Lead">

  <button class="secondary" onclick="nextCloser()">Pular</button>
  <button class="primary" onclick="agendar()">Reunião Agendada</button>

</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQXQEJMybM1mJ2X-Mf_EzgrCBoLt_t7leS7yI1cw_C2_g_iAc19TjHypB69AlKmR9v5Ay5Nn8g6G55o/pub?output=csv";
const WEBHOOK_URL = "https://hook.us2.make.com/xh4sxhoftr8gyemrd18rjw9brksguzda";

let closers = [];
let index = 0;

// carregar closers
async function loadClosers() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  closers = text.split("\n")
    .map(l => l.replace(/"/g,"").trim())
    .filter(l => l && l.toLowerCase() !== "name");

  render();
}

// mostrar closer atual
function render() {
  const el = document.getElementById("closer");

  if (!closers.length) {
    el.innerText = "Sem closers";
    return;
  }

  el.innerText = closers[index % closers.length];
}

// próximo closer
function nextCloser() {
  index++;
  render();
}

// agendar reunião
async function agendar() {
  const sdr = document.getElementById("sdr").value.trim();
  const lead = document.getElementById("lead").value.trim();

  if (!sdr || !lead) {
    alert("Preencha Nome do SDR e Nome do Lead");
    return;
  }

  const closer = closers[index % closers.length];

  try {
    await fetch(WEBHOOK_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        closer: closer,
        sdr: sdr,
        lead: lead
      })
    });

    // limpa lead (pra próximo atendimento)
    document.getElementById("lead").value = "";

    // avança fila
    index++;
    render();

    alert("Reunião registrada com sucesso!");

  } catch (err) {
    alert("Erro ao enviar dados");
    console.error(err);
  }
}

// iniciar
loadClosers();

</script>

</body>
</html>
