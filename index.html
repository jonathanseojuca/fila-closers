<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fila de Closers Mercadinho do Seo Juca</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --accent: #033517;
  --bg: #f5f4f0;
}

body {
  font-family: Arial;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 20px;
  padding: 30px;
}

.card, .chart-card {
  background: white;
  padding: 25px;
  border-radius: 12px;
  width: 350px;
}

.closer {
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 20px;
  text-align: center;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  cursor: pointer;
}

.primary {
  background: var(--accent);
  color: white;
  border: none;
}

.total {
  font-size: 22px;
  font-weight: bold;
  text-align: center;
  margin: 10px 0;
}
</style>
</head>

<body>

<div class="card">

  <h3>Fila de Closers</h3>

  <div class="closer" id="closer">Carregando...</div>

  <label>SDR</label>
  <select id="sdr"></select>

  <label>Lead</label>
  <input id="lead">

  <label>Data da Reunião</label>
  <input type="date" id="data_reuniao">

  <button onclick="nextCloser()">Pular</button>
  <button class="primary" onclick="agendar()">Agendar</button>

</div>

<div class="chart-card">

  <h3>Reuniões por dia</h3>

  <input type="date" id="filtroData" onchange="loadStats()">

  <div class="total" id="total">0 reuniões</div>

  <canvas id="chart"></canvas>

</div>

<script>

const CLOSERS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQXQEJMybM1mJ2X-Mf_EzgrCBoLt_t7leS7yI1cw_C2_g_iAc19TjHypB69AlKmR9v5Ay5Nn8g6G55o/pub?output=csv";
const SDR_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQXQEJMybM1mJ2X-Mf_EzgrCBoLt_t7leS7yI1cw_C2_g_iAc19TjHypB69AlKmR9v5Ay5Nn8g6G55o/pub?gid=1360192723&output=csv";
const AGENDAMENTOS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQXQEJMybM1mJ2X-Mf_EzgrCBoLt_t7leS7yI1cw_C2_g_iAc19TjHypB69AlKmR9v5Ay5Nn8g6G55o/pub?gid=1127809379&output=csv";
const WEBHOOK_URL = "https://hook.us2.make.com/xh4sxhoftr8gyemrd18rjw9brksguzda";

let closers = [];
let index = 0;
let chart;

// closers
async function loadClosers() {
  const res = await fetch(CLOSERS_URL);
  const text = await res.text();

  closers = text.split("\n").slice(1).map(l => l.trim()).filter(l => l);
  render();
}

// SDR
async function loadSDRs() {
  const res = await fetch(SDR_URL);
  const text = await res.text();

  const sdrs = text.split("\n").slice(1).map(l => l.trim()).filter(l => l);

  document.getElementById("sdr").innerHTML =
    `<option value="">Selecione</option>` +
    sdrs.map(s => `<option>${s}</option>`).join("");
}

// render
function render() {
  if (!closers.length) return;
  document.getElementById("closer").innerText =
    closers[index % closers.length];
}

// próximo
function nextCloser() {
  index++;
  render();
}

// agendar
async function agendar() {
  const sdr = document.getElementById("sdr").value;
  const lead = document.getElementById("lead").value;
  const data = document.getElementById("data_reuniao").value;

  if (!sdr || !lead || !data) return alert("Preencha tudo");

  await fetch(WEBHOOK_URL, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      closer: closers[index % closers.length],
      sdr,
      lead,
      data_reuniao: data
    })
  });

  index++;
  render();
  loadStats();
}

// stats
async function loadStats() {
  const res = await fetch(AGENDAMENTOS_URL);
  const text = await res.text();

  const rows = text.split("\n").slice(1).map(r => r.split(","));

  const filtro = document.getElementById("filtroData").value;

  const counts = {};
  let total = 0;

  rows.forEach(r => {
    const closer = r[0];
    const data = r[3];

    if (!filtro || data === filtro) {
      counts[closer] = (counts[closer] || 0) + 1;
      total++;
    }
  });

  document.getElementById("total").innerText = total + " reuniões";

  const labels = Object.keys(counts);
  const dataVals = Object.values(counts);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: 'pie',
    data: {
      labels: labels,
      datasets: [{
        data: dataVals
      }]
    }
  });
}

// init
loadClosers();
loadSDRs();
loadStats();

</script>

</body>
</html>
